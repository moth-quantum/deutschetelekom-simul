<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Device Controller</h1>
        <p class="subtitle">Deutsche Telekom Quantum Simulation</p>

        <section>
            <h2>Status <button class="refresh" id="refreshBtn">Refresh</button></h2>
            <table>
                <tr>
                    <td>Mode</td>
                    <td id="currentMode"><span class="badge badge-pending">Loading</span></td>
                </tr>
                <tr>
                    <td>Bridge</td>
                    <td id="bridgeStatus"><span class="badge badge-pending">Checking</span></td>
                </tr>
                <tr>
                    <td>Hardware</td>
                    <td id="hardwareStatus"><span class="badge badge-pending">Checking</span></td>
                </tr>
            </table>
            <div class="error-text" id="hardwareError"></div>
        </section>

        <section>
            <h2>Mode</h2>
            <div class="toggle-container">
                <button class="toggle-btn" id="simulationBtn">Simulation</button>
                <button class="toggle-btn" id="hardwareBtn">Hardware</button>
            </div>
            <p class="info-text" id="modeDescription"></p>
            <div class="error-text" id="modeError"></div>
        </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();

        var currentMode = document.getElementById('currentMode');
        var bridgeStatus = document.getElementById('bridgeStatus');
        var hardwareStatus = document.getElementById('hardwareStatus');
        var hardwareError = document.getElementById('hardwareError');
        var modeDescription = document.getElementById('modeDescription');
        var modeError = document.getElementById('modeError');
        var simulationBtn = document.getElementById('simulationBtn');
        var hardwareBtn = document.getElementById('hardwareBtn');

        function badge(text, type) {
            return '<span class="badge badge-' + type + '">' + text + '</span>';
        }

        function updateUI(useHardware) {
            simulationBtn.classList.toggle('active', !useHardware);
            hardwareBtn.classList.toggle('active', useHardware);
            modeError.style.display = 'none';

            if (useHardware) {
                currentMode.innerHTML = '<span class="mode-hardware">Hardware</span>';
                modeDescription.textContent = 'Using real ThorLabs polarizers and TimeTagger.';
            } else {
                currentMode.innerHTML = '<span class="mode-simulation">Simulation</span>';
                modeDescription.textContent = 'Using random data generation. No hardware required.';
            }
        }

        async function setMode(useHardware) {
            try {
                var res = await fetch('/api/mode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ useRealHardware: useHardware })
                });
                var data = await res.json();
                if (data.success) {
                    updateUI(useHardware);
                } else {
                    modeError.textContent = data.error || 'Unknown error';
                    modeError.style.display = 'block';
                }
            } catch (err) {
                modeError.textContent = 'Connection error';
                modeError.style.display = 'block';
            }
        }

        async function checkHardware() {
            bridgeStatus.innerHTML = badge('Checking', 'pending');
            hardwareStatus.innerHTML = badge('Checking', 'pending');
            hardwareError.style.display = 'none';

            try {
                var res = await fetch('/api/hardware-status');
                var data = await res.json();

                bridgeStatus.innerHTML = data.bridge_online
                    ? badge('Online', 'ok')
                    : badge('Offline', 'err');

                hardwareStatus.innerHTML = data.hardware_connected
                    ? badge('Connected (' + data.device_id + ')', 'ok')
                    : badge('Not connected', 'err');

                if (data.error) {
                    hardwareError.textContent = data.error;
                    hardwareError.style.display = 'block';
                }
            } catch (err) {
                bridgeStatus.innerHTML = badge('Error', 'err');
                hardwareStatus.innerHTML = badge('Unknown', 'err');
                hardwareError.textContent = err.message;
                hardwareError.style.display = 'block';
            }
        }

        socket.on('mode_changed', function (data) { updateUI(data.useRealHardware); });
        simulationBtn.addEventListener('click', function () { setMode(false); });
        hardwareBtn.addEventListener('click', function () { setMode(true); });
        document.getElementById('refreshBtn').addEventListener('click', checkHardware);

        fetch('/api/mode').then(function (r) { return r.json(); }).then(function (d) { updateUI(d.useRealHardware); });
        checkHardware();
    </script>
</body>
</html>
